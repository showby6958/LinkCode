# 운영 오버레이: TLS 리버스 프록시(nginx) + 인증서 자동 갱신(certbot) + 메모리 제한.
# base(docker-compose.yml)는 로컬 개발용 그대로 두고, 배포 서버에서만 이 파일을 얹는다.
#
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# ⚠️ 최초 인증서 발급은 docker/nginx/init-letsencrypt.sh 를 한 번 실행해야 한다.
# ⚠️ 게이트웨이 8080은 base에서 호스트로 노출되니, 서버 보안그룹에서 80·443만 열 것.

name: linkcode

services:
  # ── 메모리 제한 (8GB 호스트 기준) ────────────────────────────
  # 앱 컨테이너 Dockerfile은 -XX:MaxRAMPercentage=75 라서, 컨테이너에 제한이
  # 없으면 각 JVM이 호스트 전체(8GB)의 75%를 힙으로 잡으려다 OOM 난다.
  # 아래 mem_limit 로 JVM이 "제한의 75%"를 힙으로 잡게 한다. (합계 ~5.8GB)
  mysql:
    mem_limit: 700m
  kafka:
    mem_limit: 1300m
    environment:
      KAFKA_HEAP_OPTS: "-Xmx768m -Xms256m"   # 브로커 힙 상한 고정
  redis:
    mem_limit: 200m
  auth-service:
    mem_limit: 900m        # 힙 ~675m
  interview-service:
    mem_limit: 900m        # 힙 ~675m
  api-gateway:
    mem_limit: 700m        # 힙 ~525m
  chat-consumer-service:
    mem_limit: 700m        # 힙 ~525m
  ai-consumer:
    mem_limit: 300m

  # ── 프론트엔드(React 정적) ───────────────────────────────────
  # 같은 오리진에서 서빙 → 쿠키 first-party, CORS 불필요.
  # ⚠️ 별도 레포(LinkCode-React). ../../crdt-front 형제 디렉터리로 존재해야 빌드된다.
  # REACT_APP_* 는 빌드 시점에 정적 파일로 구워지므로 도메인이 바뀌면 재빌드해야 한다.
  frontend:
    build:
      context: ../../crdt-front
      dockerfile: Dockerfile
      args:
        REACT_APP_API_BASE: https://linkcoder.duckdns.org
        REACT_APP_WS_BASE: wss://linkcoder.duckdns.org
    container_name: frontend
    mem_limit: 128m
    restart: unless-stopped

  # ── TLS 리버스 프록시 ────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    mem_limit: 64m
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro   # 서버 설정
      - letsencrypt:/etc/letsencrypt:ro              # 인증서(읽기)
      - certbot_www:/var/www/certbot:ro              # acme-challenge 웹루트(읽기)
    depends_on:
      - api-gateway
      - frontend
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    container_name: certbot
    mem_limit: 64m
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    # 12시간마다 갱신 시도(만료 30일 이내에만 실제 갱신). 최초 발급은 init 스크립트로.
    entrypoint: /bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'
    restart: unless-stopped

volumes:
  letsencrypt:
  certbot_www:
