server:
  port: 8083

spring:
  application:
    name: interview-service

  datasource:
    # 호스트/포트/계정은 환경변수로 (기본값 localhost). 컨테이너에서는 DB_HOST=mysql로 덮어쓴다.
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/linkcodeinterview?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update


  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  Kafka:
    # producer/consumer 공통 설정. 반드시 이 위치(kafka 바로 아래)여야 한다.
    # producer 아래에만 두면 컨슈머(@KafkaListener "interview-analyzed")가 이 값을
    # 못 받고 기본값 localhost:9092로 떨어진다. 컨테이너 안의 localhost는 자기
    # 자신이라 브로커를 영영 못 찾고, AI 분석 결과가 돌아오지 않는다.
    # 컨테이너에서는 KAFKA_BOOTSTRAP=kafka:19092(INTERNAL 리스너)로 덮어쓴다.
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer


app:
  # 초대 링크 생성에 쓰인다(InterviewRoomService). 프론트 주소이므로 FRONTEND_URL 로 주입.
  frontend-base-url: ${FRONTEND_URL:http://localhost:3000}
  # cors.allowed-origins 제거됨: SecurityConfig를 삭제했고 CORS는 게이트웨이가 담당한다.
