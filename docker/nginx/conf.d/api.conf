# ─────────────────────────────────────────────────────────────
#  linkcoder.duckdns.org — 단일 오리진(프론트 + 백엔드) TLS 종단
#  ⚠️ 배포 전 linkcoder.duckdns.org 를 실제 도메인으로 전부 교체할 것.
#     (init-letsencrypt.sh 의 domain, docker-compose.prod.yml 의 frontend
#      build args 도 동일하게 맞춰야 한다)
#
#  라우팅:
#    /api/ /oauth/ /oauth2/ /login/ /interview/room/ /ws /ws-code → api-gateway
#    그 외 전부                                                    → frontend(SPA)
#  (백엔드 interview API는 /interview/room/ 하위뿐이라, 프론트의
#   /interview/create·/interview/report·/interview/{id} 라우트와 충돌하지 않음)
# ─────────────────────────────────────────────────────────────

upstream gateway  { server api-gateway:8080; }
upstream frontend { server frontend:80; }

# WebSocket 업그레이드용 Connection 헤더 매핑
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# 80: ACME(certbot) 챌린지 + 그 외 전부 HTTPS 리다이렉트
server {
    listen 80;
    server_name linkcoder.duckdns.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# 443: TLS 종단 → 프론트 + 게이트웨이
server {
    listen 443 ssl;
    http2 on;
    server_name linkcoder.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/linkcoder.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/linkcoder.duckdns.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    client_max_body_size 10m;

    # 공통 프록시 헤더 (proxy_set_header 를 두지 않는 location 이 상속받는다)
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;

    # ── WebSocket → 게이트웨이 (Upgrade 헤더 필요 → 헤더를 다시 전부 명시) ──
    location /ws {
        proxy_pass http://gateway;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
    location /ws-code {
        proxy_pass http://gateway;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── REST / OAuth → 게이트웨이 (공통 헤더 상속) ──
    location /api/            { proxy_pass http://gateway; }
    location /oauth/          { proxy_pass http://gateway; }
    location /oauth2/         { proxy_pass http://gateway; }
    location /login/          { proxy_pass http://gateway; }
    location /interview/room/ { proxy_pass http://gateway; }

    # ── 그 외 전부 → 프론트(SPA). 프론트 컨테이너의 nginx가 try_files 폴백 처리 ──
    location / {
        proxy_pass http://frontend;
    }
}
