# ─────────────────────────────────────────────────────────────
#  linkcoder.duckdns.org — 단일 오리진(프론트 + 백엔드) TLS 종단
#  ⚠️ 배포 전 linkcoder.duckdns.org 를 실제 도메인으로 전부 교체할 것.
#
#  라우팅:
#    /api/ /oauth/ /oauth2/ /login/ /interview/room/ /ws /ws-code → api-gateway
#    그 외 전부                                                    → frontend(SPA)
#
#  ⚙️ 업스트림을 upstream 블록이 아니라 resolver + 변수 proxy_pass 로 참조한다.
#     upstream(또는 리터럴 호스트)은 nginx 시작 시 IP를 한 번 고정 캐시해서,
#     컨테이너가 재생성되면 옛 IP를 물고 502가 난다. 변수 proxy_pass 를 쓰면
#     Docker 내장 DNS(127.0.0.11)로 매 요청(캐시 TTL 내) 재해석 → 재배포 후에도
#     nginx 재시작 없이 자동 복구된다.
# ─────────────────────────────────────────────────────────────

# WebSocket 업그레이드용 Connection 헤더 매핑
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# 80: ACME(certbot) 챌린지 + 그 외 전부 HTTPS 리다이렉트
server {
    listen 80;
    server_name linkcoder.duckdns.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# 443: TLS 종단 → 프론트 + 게이트웨이
server {
    listen 443 ssl;
    http2 on;
    server_name linkcoder.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/linkcoder.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/linkcoder.duckdns.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    client_max_body_size 10m;

    # Docker 내장 DNS. valid=10s → 컨테이너 재생성 후 최대 10초 내 새 IP로 자동 전환.
    resolver 127.0.0.11 valid=10s ipv6=off;
    # 변수로 참조해야 런타임 재해석이 걸린다(리터럴/upstream 은 시작 시 고정됨).
    set $gw "api-gateway:8080";
    set $fe "frontend:80";

    # 공통 프록시 헤더 (proxy_set_header 를 두지 않는 location 이 상속받는다)
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;

    # ── WebSocket → 게이트웨이 (Upgrade 헤더 필요 → 헤더를 다시 전부 명시) ──
    location /ws {
        proxy_pass http://$gw;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
    location /ws-code {
        proxy_pass http://$gw;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── REST / OAuth → 게이트웨이 (공통 헤더 상속) ──
    location /api/            { proxy_pass http://$gw; }
    location /oauth/          { proxy_pass http://$gw; }
    location /oauth2/         { proxy_pass http://$gw; }
    location /login/          { proxy_pass http://$gw; }
    location /interview/room/ { proxy_pass http://$gw; }

    # ── 그 외 전부 → 프론트(SPA). 프론트 컨테이너의 nginx가 try_files 폴백 처리 ──
    location / {
        proxy_pass http://$fe;
    }
}
