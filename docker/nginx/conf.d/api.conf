# ─────────────────────────────────────────────────────────────
#  api.example.com — TLS 종단 + api-gateway 리버스 프록시
#  ⚠️ 배포 전 api.example.com 을 실제 백엔드 도메인으로 전부 교체할 것.
#     (init-letsencrypt.sh 의 domain 변수도 동일하게 맞춰야 한다)
# ─────────────────────────────────────────────────────────────

upstream gateway {
    server api-gateway:8080;   # compose 내부 네트워크의 게이트웨이
}

# WebSocket 업그레이드용 Connection 헤더 매핑
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# 80: ACME(certbot) 챌린지 + 그 외 전부 HTTPS 리다이렉트
server {
    listen 80;
    server_name api.example.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;          # certbot 웹루트 (compose 볼륨)
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# 443: TLS 종단 → 게이트웨이
server {
    listen 443 ssl;
    http2 on;
    server_name api.example.com;

    ssl_certificate     /etc/letsencrypt/live/api.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    client_max_body_size 10m;

    location / {
        proxy_pass http://gateway;
        proxy_http_version 1.1;

        # WebSocket 업그레이드 (/ws, /ws-code)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # 원본 정보 전달 → 게이트웨이/auth 가 https 로 인식(쿠키 Secure·리다이렉트 정확)
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # 장시간 WebSocket 연결 유지
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
