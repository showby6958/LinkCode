name: CI/CD

# main push → 컴파일 검증 후 서버 자동 배포.
# PR(→main) 에서는 build-test 만 돌려 깨진 코드 병합을 막는다.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 동시에 여러 배포가 겹치지 않게 직렬화한다.
concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  build-test:
    name: Build (compile check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      # 테스트는 DB/Kafka/Redis 컨텍스트가 필요하므로 CI에선 컴파일·패키징만.
      - name: Gradle build (skip tests)
        run: |
          chmod +x gradlew
          ./gradlew build -x test --no-daemon

  deploy:
    name: Deploy to EC2
    needs: build-test
    # 배포는 main 에 push 될 때만 (PR 이벤트에서는 배포 안 함).
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: SSH & run deploy script
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 20m
          script: bash ~/apps/LinkCode/deploy.sh
