# LinkCode 로컬/배포용 오케스트레이션
#
#   1) cp .env.example .env  후 값 채우기
#   2) docker compose up -d --build
#   3) 브라우저에서 http://localhost:8080 (게이트웨이가 유일한 진입점)
#
# 기동 순서: mysql·kafka·redis (healthy) → auth·interview·chat-consumer → api-gateway
# (최신 Compose는 상단 version 키가 불필요하다)

name: linkcode

services:
  # ─────────────────────────── 인프라 ───────────────────────────
  mysql:
    image: mysql:8.4
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # 최초 기동 시 3개 DB 생성 (linkcodeauth/interview/consumer)
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  kafka:
    image: apache/kafka:3.9.0
    container_name: kafka
    ports:
      # 호스트에서 접속용(EXTERNAL). 컨테이너 간은 kafka:19092(INTERNAL)를 쓴다.
      - "9092:9092"
    environment:
      # 단일 노드 KRaft (broker + controller 겸용, Zookeeper 불필요)
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      # 리스너 3종: CONTROLLER, INTERNAL(컨테이너간), EXTERNAL(호스트)
      # ⚠️ 호스트는 0.0.0.0 이 아니라 빈 값(://:port)으로 둔다. 그래야 CONTROLLER
      #    리스너(advertised 미지정)의 유도 주소가 0.0.0.0 이 되어 format이 거부되는
      #    문제를 피한다. (빈 호스트면 0.0.0.0 바인딩 + 호스트명 기반 유도)
      KAFKA_LISTENERS: CONTROLLER://:9093,INTERNAL://:19092,EXTERNAL://:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:19092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # 단일 노드이므로 복제 계수는 모두 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    # 개발용: 데이터 영속 볼륨을 두지 않는다(이미지 기본 로그 디렉터리 사용 →
    # 소유권 이슈 회피). 재기동 시 토픽/오프셋이 초기화된다. 영속이 필요하면
    # 적절한 권한과 함께 KAFKA_LOG_DIRS + named volume 을 추가한다.
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  # ─────────────────────────── 애플리케이션 ───────────────────────────
  auth-service:
    build:
      context: .                       # 멀티모듈이라 컨텍스트는 레포 루트
      dockerfile: auth-service/Dockerfile
    container_name: auth-service
    env_file: .env
    ports:
      - "8081:8081"
    depends_on:
      mysql: { condition: service_healthy }
      kafka: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      # 액추에이터 미포함 → 포트 오픈(=스프링 기동 완료 시점)으로 판정 (bash /dev/tcp)
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8081' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    restart: unless-stopped

  interview-service:
    build:
      context: .
      dockerfile: interview-service/Dockerfile
    container_name: interview-service
    env_file: .env
    ports:
      - "8083:8083"
    depends_on:
      mysql: { condition: service_healthy }
      kafka: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8083' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    restart: unless-stopped

  chat-consumer-service:
    build:
      context: .
      dockerfile: chat-consumer-service/Dockerfile
    container_name: chat-consumer-service
    env_file: .env
    # server.port=0 (랜덤) 백그라운드 컨슈머 → 노출 포트/헬스체크 없음
    depends_on:
      mysql: { condition: service_healthy }
      kafka: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: unless-stopped

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: api-gateway
    env_file: .env
    ports:
      - "8080:8080"                    # 외부 진입점
    depends_on:
      # 게이트웨이는 기동 시 auth의 JWKS를 참조하므로 auth가 준비된 뒤 뜬다
      auth-service: { condition: service_healthy }
      interview-service: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8080' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

volumes:
  mysql_data:
