server:
  port: 8081
  # 게이트웨이가 앞단에 있으므로, 게이트웨이가 붙여주는 X-Forwarded-* 헤더를 반영해
  # 외부 주소(게이트웨이 URL) 기준으로 리다이렉트 URL을 만든다. 이게 없으면
  # auth-service가 자기 내부 주소(auth-service:8081)로 잘못된 redirect_uri를 생성한다.
  forward-headers-strategy: framework

spring:
  application:
    name: auth-service

  datasource:
    # 호스트/포트/계정은 환경변수로. 기본값 localhost라 로컬 개발은 그대로 동작하고,
    # 컨테이너에서는 DB_HOST=mysql 등으로 덮어쓴다. DB 이름(linkcodeauth)만 고정.
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/linkcodeauth?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update

  Kafka:
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      # 컨테이너에서는 KAFKA_BOOTSTRAP=kafka:19092(INTERNAL 리스너)로 덮어쓴다.
      bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  security:
    oauth2:
      client:
        registration:
          google:
            # 자격증명은 .env 로만 주입(기본값 없음 → 누락 시 기동 실패로 드러남).
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - profile
              - email
            # 브라우저가 돌아올 '외부' 주소(게이트웨이)를 명시한다.
            # {baseUrl} 템플릿을 쓰지 않는 이유: 그러면 요청의 호스트로부터 주소를
            # 추론하는데, 게이트웨이 뒤에서는 내부 주소(auth-service:8081)가 잡혀
            # Google이 redirect_uri_mismatch로 거부한다. (SCG 2025.0이 X-Forwarded-*를
            # 보내지 않아 forward-headers-strategy만으로는 해결되지 않음 — 실측 확인)
            # 운영에서는 OAUTH_REDIRECT_BASE=https://내도메인 으로 덮어쓴다.
            # → 이 값을 Google 콘솔의 '승인된 리디렉션 URI'에 그대로 등록해야 한다.
            redirect-uri: "${OAUTH_REDIRECT_BASE:http://localhost:8080}/login/oauth2/code/google"

          naver:
            # 자격증명은 .env 로만 주입.
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            # 위 google과 동일한 이유로 외부 주소를 명시한다.
            # → 네이버 개발자센터의 Callback URL에 이 값을 등록해야 한다.
            redirect-uri: "${OAUTH_REDIRECT_BASE:http://localhost:8080}/login/oauth2/code/naver"
            scope:
              - name
              - email
              - profile_image
            client-name: Naver

        provider:
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response


system:
  admin:
    email: ${SYSTEM_ADMIN_EMAIL}

# JWT 서명 시크릿. 게이트웨이·모든 서비스가 동일 값을 공유해야 한다. .env 로만 주입.
jwt:
  secret: ${JWT_SECRET}